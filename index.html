<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ef6ea2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LUMI" />
  <title>LUMI</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />
  <link rel="stylesheet" href="./matrix_8_ble_web_app.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 80 80" aria-hidden="true">
          <g fill="currentColor">
            <rect x="5" y="5" width="8" height="8" rx="2"/><rect x="17" y="5" width="8" height="8" rx="2"/><rect x="29" y="5" width="8" height="8" rx="2"/><rect x="41" y="5" width="8" height="8" rx="2"/><rect x="53" y="5" width="8" height="8" rx="2"/><rect x="65" y="5" width="8" height="8" rx="2"/>
            <rect x="5" y="17" width="8" height="8" rx="2"/><rect x="29" y="17" width="8" height="8" rx="2"/><rect x="65" y="17" width="8" height="8" rx="2"/>
            <rect x="5" y="29" width="8" height="8" rx="2"/><rect x="29" y="29" width="8" height="8" rx="2"/><rect x="53" y="29" width="8" height="8" rx="2"/><rect x="65" y="29" width="8" height="8" rx="2"/>
            <rect x="5" y="41" width="8" height="8" rx="2"/><rect x="29" y="41" width="8" height="8" rx="2"/><rect x="41" y="41" width="8" height="8" rx="2"/><rect x="65" y="41" width="8" height="8" rx="2"/>
            <rect x="5" y="53" width="8" height="8" rx="2"/><rect x="17" y="53" width="8" height="8" rx="2"/><rect x="29" y="53" width="8" height="8" rx="2"/><rect x="53" y="53" width="8" height="8" rx="2"/><rect x="65" y="53" width="8" height="8" rx="2"/>
            <rect x="5" y="65" width="8" height="8" rx="2"/><rect x="17" y="65" width="8" height="8" rx="2"/><rect x="29" y="65" width="8" height="8" rx="2"/><rect x="41" y="65" width="8" height="8" rx="2"/><rect x="53" y="65" width="8" height="8" rx="2"/><rect x="65" y="65" width="8" height="8" rx="2"/>
          </g>
        </svg>
        <h1 class="title">LUMI</h1>
      </div>
      <div class="hero-left">
        <button id="connectionMenuBtn" class="header-btn connection-indicator" title="Bağlan" aria-label="Bağlan">
          <span class="connection-dot" aria-hidden="true"></span>
          <span id="connectionLabel" class="connection-label">Bağlan</span>
          <span class="sr-only">Bağlantı Butonu</span>
        </button>
      </div>
    </section>

    <nav class="tabs" aria-label="Sekmeler">
      <button class="tab-btn active" data-tab="draw">
        <svg viewBox="0 0 24 24"><path d="M7 16c.55 0 1 .45 1 1a3 3 0 0 1-3 3H4a1 1 0 0 1 0-2h1a1 1 0 0 0 1-1c0-.55.45-1 1-1Zm12.71-9.29a1 1 0 0 0 0-1.42l-1.99-1.99a1 1 0 0 0-1.42 0l-8.9 8.9c-.26.26-.45.58-.55.93l-.67 2.35a.75.75 0 0 0 .93.93l2.35-.67c.35-.1.67-.29.93-.55l8.9-8.9Z"/></svg>
        <span>Çizim</span>
      </button>
      <button class="tab-btn" data-tab="text">
        <svg viewBox="0 0 24 24"><path d="M4 5h16v3h-6v11h-4V8H4z"/></svg>
        <span>Yazı</span>
      </button>
      <button class="tab-btn" data-tab="anim">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7zM3 5h3v14H3z"/></svg>
        <span>Animasyon</span>
      </button>
      <button class="tab-btn" data-tab="device">
        <svg viewBox="0 0 80 80" aria-hidden="true"><g fill="currentColor"><rect x="5" y="5" width="8" height="8" rx="2"/><rect x="17" y="5" width="8" height="8" rx="2"/><rect x="29" y="5" width="8" height="8" rx="2"/><rect x="41" y="5" width="8" height="8" rx="2"/><rect x="53" y="5" width="8" height="8" rx="2"/><rect x="65" y="5" width="8" height="8" rx="2"/><rect x="5" y="17" width="8" height="8" rx="2"/><rect x="29" y="17" width="8" height="8" rx="2"/><rect x="65" y="17" width="8" height="8" rx="2"/><rect x="5" y="29" width="8" height="8" rx="2"/><rect x="29" y="29" width="8" height="8" rx="2"/><rect x="53" y="29" width="8" height="8" rx="2"/><rect x="65" y="29" width="8" height="8" rx="2"/><rect x="5" y="41" width="8" height="8" rx="2"/><rect x="29" y="41" width="8" height="8" rx="2"/><rect x="41" y="41" width="8" height="8" rx="2"/><rect x="65" y="41" width="8" height="8" rx="2"/><rect x="5" y="53" width="8" height="8" rx="2"/><rect x="17" y="53" width="8" height="8" rx="2"/><rect x="29" y="53" width="8" height="8" rx="2"/><rect x="53" y="53" width="8" height="8" rx="2"/><rect x="65" y="53" width="8" height="8" rx="2"/><rect x="5" y="65" width="8" height="8" rx="2"/><rect x="17" y="65" width="8" height="8" rx="2"/><rect x="29" y="65" width="8" height="8" rx="2"/><rect x="41" y="65" width="8" height="8" rx="2"/><rect x="53" y="65" width="8" height="8" rx="2"/><rect x="65" y="65" width="8" height="8" rx="2"/></g></svg>
        <span>Cihaz</span>
      </button>
    </nav>

    <div class="panel-wrap">
      <section id="tab-draw" class="panel" data-wide="1">
        <div class="pixel-wrap">
          <div id="pixelGrid" class="pixel-grid"></div>
        </div>
        <div class="quick-grid">
          <button id="clearGridBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M6 7h12l-1 14H7zm3-4h6l1 2H8z"/></svg>
            <span>Temizle</span>
          </button>
          <button id="fillGridBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M7 3h10v18H7z"/></svg>
            <span>Doldur</span>
          </button>
          <button id="invertGridBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 0 18V3z"/></svg>
            <span>Tersle</span>
          </button>
          <button id="rotateBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L7 6l5 5V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-8z"/></svg>
            <span>Döndür</span>
          </button>
          <button id="previewBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M12 5c-6 0-9 7-9 7s3 7 9 7 9-7 9-7-3-7-9-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
            <span id="previewBtnLabel">Canlı Önizleme</span>
          </button>
          <button id="sendImgBtn" class="tool-btn primary">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zm4 4h8v8H8z"/></svg>
            <span>Göster</span>
          </button>
          <button id="addFrameBtn" class="tool-btn wide">
            <svg viewBox="0 0 24 24"><path d="M11 5h2v14h-2zM5 11h14v2H5z"/></svg>
            <span>Kare Ekle</span>
          </button>
        </div>

        <div class="stack" style="margin-top:10px;">
          <div class="field brightness-shell">
            <label for="brightnessRange">Parlaklık</label>
            <div class="brightness-row">
              <div class="brightness-slider-wrap">
                <input id="brightnessRange" class="brightness-slider" type="range" min="0" max="15" value="8" />
                <span id="brightnessFloatVal" class="brightness-float-value" hidden>8</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-text" class="panel" hidden>
        <div class="stack">
          <div class="field">
            <label for="textInput">Mesaj</label>
            <input id="textInput" type="text" maxlength="120" placeholder="Slm" />
          </div>
          <div class="field">
            <label for="textSpeedInput">Hız (ms)</label>
            <input id="textSpeedInput" type="number" min="1" max="65535" value="90" />
          </div>
          <div class="action-row">
            <span class="pill">Yön</span>
            <button id="dirLeftBtn" class="chip-toggle">
              <svg viewBox="0 0 24 24"><path d="m14 7-5 5 5 5V7z"/></svg>
              <span>Sola</span>
            </button>
            <button id="dirRightBtn" class="chip-toggle">
              <svg viewBox="0 0 24 24"><path d="m10 17 5-5-5-5v10z"/></svg>
              <span>Sağa</span>
            </button>
          </div>
          <div class="row">
            <button id="txtSendBtn" class="tool-btn primary wide">
              <svg viewBox="0 0 24 24"><path d="M3 11h11v2H3zm9-6 9 7-9 7v-5H5v-4h7z"/></svg>
              <span>Mesajı Oynat</span>
            </button>
          </div>
        </div>
      </section>

      <section id="tab-anim" class="panel" hidden>
        <div class="row">
          <div class="field" style="flex:1 1 110px;">
            <label for="frameDurationInput">Süre</label>
            <input id="frameDurationInput" type="number" min="1" max="65535" value="150" />
          </div>
          <div class="field" style="flex:1 1 110px;">
            <label for="frameBrightnessInput">Kare BRT</label>
            <input id="frameBrightnessInput" type="number" min="0" max="15" value="8" />
          </div>
        </div>
        <div class="row">
          <div class="field" style="flex:1 1 100px;">
            <label for="loopSelect">Loop</label>
            <select id="loopSelect">
              <option value="1" selected>Açık</option>
              <option value="0">Kapalı</option>
            </select>
          </div>
        </div>

        <div class="quick-grid" style="margin-top:10px;">
          <button id="updateFrameBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M5 19h14v2H5zM14.7 5.3l4 4L10 18H6v-4z"/></svg>
            <span>Güncelle</span>
          </button>
          <button id="deleteFrameBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M6 7h12l-1 14H7zm3-4h6l1 2H8z"/></svg>
            <span>Sil</span>
          </button>
          <button id="clearFramesBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm2 4h12v10H6z"/></svg>
            <span>Hepsini Sil</span>
          </button>
        </div>

        <div class="row" style="margin-top:10px;">
          <button id="playAnimBtn" class="icon-btn" title="Play" aria-label="Play">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button id="aniPauseBtn" class="icon-btn" title="Pause" aria-label="Pause">
            <svg viewBox="0 0 24 24"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
          </button>
          <button id="aniResumeBtn" class="icon-btn" title="Resume" aria-label="Resume">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button id="aniStopBtn" class="icon-btn" title="Stop" aria-label="Stop">
            <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
          </button>
          <span class="small">Play: değişim varsa otomatik yükler.</span>
        </div>

        <div id="frameInfo" class="small" style="margin-top:10px;">0 kare</div>
        <div id="frames" class="frames"></div>
      </section>

      <section id="tab-device" class="panel" hidden>
        <div class="device-grid">
          <button id="pingBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 18 0h-2a7 7 0 0 0-14 0zm4 0a5 5 0 0 1 10 0h-2a3 3 0 0 0-6 0zm4 0h2v8h-2z"/></svg>
            <span>Ping</span>
          </button>
          <button id="statusBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4zm3 3v2h10V8zm0 4v2h6v-2z"/></svg>
            <span>Durum</span>
          </button>
          <button id="helpBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M11 18h2v2h-2zm1-16a9 9 0 0 0-9 9h2a7 7 0 1 1 7 7v2A9 9 0 1 0 12 2zm0 5a3 3 0 0 0-3 3h2a1 1 0 1 1 1 1 2 2 0 0 0-2 2v1h2v-1a.5.5 0 0 1 .5-.5A2.5 2.5 0 1 0 12 7z"/></svg>
            <span>Yardım</span>
          </button>
          <button id="clearDeviceBtn" class="tool-btn warn">
            <svg viewBox="0 0 24 24"><path d="M6 7h12l-1 14H7zM9 3h6l1 2H8z"/></svg>
            <span>Temizle</span>
          </button>
          <button id="stopBtn" class="tool-btn danger">
            <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            <span>Durdur</span>
          </button>
          <button id="themeBtn" class="tool-btn">
            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm6.5 2.5 1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/></svg>
            <span>Tema</span>
          </button>
        </div>
        <div id="themeMeta" class="theme-meta">Tema: Pembe</div>
        <div class="status-grid" id="statusKv" style="margin-top:10px;"></div>
        <div id="log" class="log"></div>
      </section>
    </div>
  </main>

  <script type="module" src="./matrix_8_ble_web_app.main.js"></script>
</body>
</html>
